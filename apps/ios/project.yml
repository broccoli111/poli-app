name: Poli
options:
  bundleIdPrefix: com.poli
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Poli:
    type: application
    platform: iOS
    sources:
      - Poli
    settings:
      base:
        INFOPLIST_FILE: Poli/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.poli.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: Poli/Poli.entitlements
